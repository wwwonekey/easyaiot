# 构建期依赖缓存（运行时无需挂载）：
#   项目根 .build-cache/{ai,video}/pip-cache、pip-wheels — 按模块隔离（见 install_linux*.sh）
#   默认属主 UID/GID=1000（BUILD_CACHE_UID 可覆盖）
services:
  ai-service:
    image: ai-service:latest
    container_name: ai-service
    user: root
    # runtime: nvidia  # 由 install_linux.sh 检测到 GPU 后自动启用

    # 业务源码经卷挂载（见下方 volumes 的 ./:/app）后，用 sh 调用入口脚本，
    # 这样宿主机 docker-entrypoint.sh 即使没有可执行位也能正常启动。
    # 注意：覆盖 entrypoint 会重置镜像 CMD，故必须同时显式声明 command。
    entrypoint: ["/bin/sh", "/app/docker-entrypoint.sh"]
    command: ["python", "run.py"]

    # 环境变量文件（用于Docker部署）
    env_file:
      - .env.docker

    # 网络模式：使用host模式以访问宿主机局域网
    # 注意：使用host模式后，端口映射将失效，服务直接使用宿主机网络
    network_mode: host

    # 数据卷挂载
    volumes:
      # 业务源码（实现「仅改代码、依赖不变」时 update 免重建镜像：git pull 后重启进程即生效）
      # 下方更具体的子目录挂载（./data 等）会按路径深度优先覆盖此挂载，互不冲突
      - ./:/app
      # 数据目录（包含数据集、模型、推理结果、上传文件）
      - ./data:/app/data
      # mini 形态本地对象存储与 SRS 录像等同用宿主机 /data（network_mode: host 不共享 mount namespace）
      - /data:/data:rw
      # 静态文件目录
      - ./static:/app/static
      # 临时上传目录
      - ./temp_uploads:/app/temp_uploads
      # 模型文件目录（如果存在）
      - ./model:/app/model
      # 预训练模型文件
      - ./yolo11n:/app/yolo11n
      - ./yolo11n.pt:/app/yolo11n.pt
      - ./yolov8n.pt:/app/yolov8n.pt
      - ./yolo26n.pt:/app/yolo26n.pt
      # 环境变量配置文件（用于Docker部署，使用.env.docker）
      - ./.env.docker:/app/.env:ro
      # mini 形态不启 MinIO 服务时，只读挂载 flat 种子数据供懒加载/启动同步
      - ../.scripts/minio:/minio-seed-data:ro

    # 环境变量
    environment:
      # GPU相关配置
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      # Python环境
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
      # 源码经 ./:/app 卷挂载且容器以 root 运行，禁止写 .pyc，避免 root 属主的
      # __pycache__ 污染宿主机源码树（否则可能干扰后续 git 操作）
      - PYTHONDONTWRITEBYTECODE=1
      # Flask配置
      - FLASK_RUN_PORT=${FLASK_RUN_PORT:-5000}
      - FLASK_RUN_HOST=${FLASK_RUN_HOST:-0.0.0.0}
      # 数据库配置（使用localhost，因为使用host网络模式，中间件端口已映射到宿主机）
      - DATABASE_URL=postgresql://postgres:iot45722414822@localhost:5432/iot-ai20
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-please-change-this-to-a-random-string}
      # Nacos配置（使用localhost，因为使用host网络模式）
      - NACOS_SERVER=${NACOS_SERVER:-localhost:8848}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-}
      - NACOS_USERNAME=${NACOS_USERNAME:-nacos}
      - NACOS_PASSWORD=${NACOS_PASSWORD:-basiclab@iot78475418754}
      - SERVICE_NAME=${SERVICE_NAME:-model-server}
      # Pod IP配置（容器内会自动获取，也可手动指定）
      - POD_IP=${POD_IP:-}
      # MinIO对象存储配置（使用localhost，因为使用host网络模式）
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-localhost:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-basiclab@iot975248395}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      # Redis配置（使用localhost，因为使用host网络模式）
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-basiclab@iot975248395}
      # Kafka配置（使用localhost，因为使用host网络模式）
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
      # TDengine配置（使用localhost，因为使用host网络模式）
      - TDENGINE_HOST=${TDENGINE_HOST:-localhost}
      - TDENGINE_PORT=${TDENGINE_PORT:-6030}
      # 讯飞语音识别配置（可选）
      - XUNFEI_APP_ID=${XUNFEI_APP_ID:-}
      - XUNFEI_SECRET_KEY=${XUNFEI_SECRET_KEY:-}
      # FFmpeg配置（可选）
      - FFMPEG_PATH=${FFMPEG_PATH:-ffmpeg}
      - FFPROBE_PATH=${FFPROBE_PATH:-ffprobe}
      # SAM 万物分割配置
      - SAM_ENABLED=${SAM_ENABLED:-false}
      - SAM_ENGINE=${SAM_ENGINE:-sam3}
      - SAM_MODEL_PATH=${SAM_MODEL_PATH:-}
      - SAM_CONF=${SAM_CONF:-0.45}
      - SAM_IMGSZ=${SAM_IMGSZ:-1078}
      - SAM_MODELSCOPE_ID=${SAM_MODELSCOPE_ID:-facebook/sam3.1}
      - SAM_MODELSCOPE_FILE=${SAM_MODELSCOPE_FILE:-sam3.1_multiplex.pt}
      - SAM_MINIO_BUCKET=${SAM_MINIO_BUCKET:-sam-models}
      # 推流服务器配置（可选）
      - MODEL_AI_PUSH_URL=${MODEL_AI_PUSH_URL:-pro.basiclab.top:1935}
      # 时区配置
      - TZ=${TZ:-Asia/Shanghai}
      # Ultralytics (YOLO) 配置目录
      - YOLO_CONFIG_DIR=${YOLO_CONFIG_DIR:-/tmp/Ultralytics}
      # PaddleX 临时目录（通过环境变量或使用默认的 /home/appuser/.paddlex）
      # 代理配置（可选）
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
      # GPU配置
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}

    # 资源限制（GPU 配置，如果 NVIDIA Container Toolkit 未配置，请注释掉以下部分）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all      # 使用全部 GPU
    #           capabilities: [gpu]

    # 重启策略
    restart: unless-stopped

    # 健康检查
    # 注意：start_period设置为90秒，因为应用启动时会等待Nacos服务（最多30秒）
    # 加上应用初始化时间，总共可能需要60-90秒
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

    # 注意：使用network_mode: host后，不再需要networks配置
    # 容器将直接使用宿主机的网络栈，可以：
    # 1. 访问宿主机局域网
    # 2. 通过localhost访问映射到宿主机的中间件服务端口
    # 3. 确保中间件服务（Nacos、PostgresSQL等）的端口已映射到宿主机

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# 注意：使用network_mode: host后，不再需要networks配置
# 如果需要同时访问容器网络和宿主机网络，可以考虑以下替代方案：
# 1. 使用macvlan网络（需要root权限）
# 2. 使用host网络 + 通过IP访问中间件容器
# 3. 使用sidecar容器模式

