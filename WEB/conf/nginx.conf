user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 550M;
    client_header_timeout 20m;
    client_body_timeout 20m;
    underscores_in_headers on;

    # CORS跨域配置
    map $http_origin $cors_origin {
        default *;
        "~^https?://.*" $http_origin;
    }

    # WebSocket 升级映射（供 ZLMediaKit ws-flv 代理使用）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Gzip压缩配置
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png application/json application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # 通用代理头设置，避免重复定义
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 1500s;
    proxy_read_timeout 20m;
    proxy_send_timeout 20m;

    # 前端静态文件服务
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html index.htm;

        # Docker 内置 DNS；配合变量 proxy_pass，可选上游（如 NodeRED）未部署时仍可启动 nginx
        resolver 127.0.0.11 valid=30s ipv6=off;

        # 流地址 secure_link 签名密钥（唯一处）：必须与 VIDEO 的 STREAM_TICKET_SECRET 完全一致。
        # 下面 /ai|/live 与 /rtp 两处 secure_link_md5 都引用此变量，避免重复书写。
        set $stream_secret "Zr1y9tiPBhB3FhFYUE0G1BWPiQ0Fgva";

        # 前端路由支持（Vue Router history模式）
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 构建产物（带 hash 的 JS/CSS）：文件不存在直接返回 404，不回退 index.html，
        # 避免缺失资源被当成 index.html(text/html) 返回，浏览器报
        # "disallowed MIME type (text/html)"。^~ 确保优先于上面的正则匹配。
        location ^~ /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # API代理配置（可根据实际需求修改）
        # Admin API代理（含集群概览 WebSocket：/admin-api/node/ws/cluster-metrics）
        location /admin-api/ {
            allow all;

            # WebSocket 升级（集群指标 WS 等经 gateway 转 node-server）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            
            # CORS跨域配置
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }
            
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            proxy_pass http://gateway:48080/admin-api/;

            # 上游不可达时返回 JSON 友好错误
            proxy_intercept_errors on;
            error_page 502 504 = @admin_api_unavailable;
        }

        # /admin-api 上游不可达时的 JSON 错误响应
        location @admin_api_unavailable {
            add_header Content-Type "application/json; charset=utf-8" always;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 503 '{"code":503,"msg":"后端服务未就绪，请检查 Gateway(iot-gateway) 是否已启动","data":null}';
        }

        # AI 模型服务代理（/dev-api/model/** 直连 AI 服务，避免经 Gateway 中转引入额外超时）
        # 注意：^~ 优先于 /dev-api/ 的通用 location，与 mini 配置保持一致
        location ^~ /dev-api/model/ {
            allow all;

            # CORS跨域配置
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Authorization,tenant-id' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Authorization,tenant-id' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_connect_timeout 300s;
            proxy_send_timeout 20m;
            proxy_read_timeout 20m;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_pass http://ai-host:5000/model/;
        }

        # AI服务代理（使用^~确保优先匹配）
        location ^~ /dev-api/ai/ {
            allow all;
            
            # CORS跨域配置
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }
            
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            # 使用ai-host访问宿主机上的ai-service（使用host网络模式）
            proxy_pass http://ai-host:5000/;
        }

        # Video服务代理（使用^~确保优先匹配）
        location ^~ /dev-api/video/ {
            allow all;
            
            # CORS跨域配置
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }
            
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            # 代理超时配置（针对视频服务可能的长连接）
            # 增加连接超时时间，避免499错误
            proxy_connect_timeout 300s;
            proxy_send_timeout 20m;
            proxy_read_timeout 20m;
            proxy_buffering off;
            proxy_request_buffering off;
            
            # 添加HTTP版本和keepalive配置
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # 错误处理 - 移除proxy_next_upstream，避免重试导致的问题
            # proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            # proxy_next_upstream_tries 2;
            # proxy_next_upstream_timeout 10s;
            
            # 使用video-host访问宿主机上的video-service（使用host网络模式）
            # 注意：如果host-gateway不工作，需要在docker-compose.yaml中手动配置宿主机IP
            # 如果遇到499错误，请检查：
            # 1. video-host是否能正确解析到宿主机IP（在nginx容器内执行: ping video-host）
            # 2. 宿主机上的video-service是否正常运行（在宿主机执行: curl http://localhost:6000/actuator/health）
            # 3. 如果host-gateway不工作，请在docker-compose.yaml中手动配置宿主机IP
            proxy_pass http://video-host:6000/video/;
            
            # 添加错误日志记录
            error_log /var/log/nginx/video_error.log warn;
            access_log /var/log/nginx/video_access.log main;
        }

        # NodeRED服务代理（使用^~确保优先匹配）
        location ^~ /dev-api/nodeRed/ {
            allow all;
            
            # CORS跨域配置
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }
            
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            # 变量 proxy_pass 延迟解析，mini/standard 未部署 NodeRED 时 nginx 仍可启动
            # set 必须在 rewrite break 之前：break 会终止 rewrite 模块，其后的 set 不会执行
            set $nodered_upstream NodeRED:1880;
            # 路径重写：将 /dev-api/nodeRed/ 前缀移除
            rewrite ^/dev-api/nodeRed/(.*)$ /$1 break;
            proxy_pass http://$nodered_upstream;
        }

        # NodeRED服务代理（直接路径，兼容前端直接使用/nodeRed）
        location ^~ /nodeRed {
            allow all;
            
            # CORS跨域配置
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }
            
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            # 变量 proxy_pass 延迟解析，mini/standard 未部署 NodeRED 时 nginx 仍可启动
            # set 必须在 rewrite break 之前：break 会终止 rewrite 模块，其后的 set 不会执行
            set $nodered_upstream NodeRED:1880;
            # 路径重写：将 /nodeRed 前缀移除
            rewrite ^/nodeRed(.*)$ $1 break;
            proxy_pass http://$nodered_upstream;
        }

        # SRS服务代理（使用^~确保优先匹配）
        location ^~ /dev-api/srs/ {
            allow all;
            
            # CORS跨域配置
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }
            
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            # 代理超时配置（针对SRS流媒体服务可能的长连接）
            proxy_connect_timeout 300s;
            proxy_send_timeout 20m;
            proxy_read_timeout 20m;
            proxy_buffering off;
            proxy_request_buffering off;
            
            # 添加HTTP版本和keepalive配置
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # 使用srs-host访问宿主机上的SRS服务（使用host网络模式）
            # 注意：如果host-gateway不工作，需要在docker-compose.yaml中手动配置宿主机IP
            # 如果遇到499错误，请检查：
            # 1. srs-host是否能正确解析到宿主机IP（在nginx容器内执行: ping srs-host）
            # 2. 宿主机上的SRS服务是否正常运行（在宿主机执行: curl http://localhost:1985/api/v1/versions）
            # 3. 如果host-gateway不工作，请在docker-compose.yaml中手动配置宿主机IP
            proxy_pass http://srs-host:1985/;
            
            # 添加错误日志记录
            error_log /var/log/nginx/srs_error.log warn;
            access_log /var/log/nginx/srs_access.log main;
        }

        # SRS HTTP-FLV 流代理：浏览器以页面 host 拉流，nginx 转发到 SRS(8080)
        # 后端生成的播放地址为 http://<host>:8080/ai/<id>.flv 与 /live/<id>.flv，
        # 前端已将 host:port 改写为当前页面地址，这里负责把 /ai|/live 的媒体路径转给 SRS。
        location ~* ^/(ai|live)/.+\.(flv|m3u8|ts)$ {
            allow all;

            # secure_link 鉴权：地址须带 ?e=<过期>&st=<签名>，由 VIDEO 签发接口签发。
            # 密钥见 server 块的 $stream_secret；公式 = md5("$arg_e$uri <secret>")。
            secure_link        $arg_st,$arg_e;
            secure_link_md5    "$arg_e$uri $stream_secret";
            # === 强制校验：待「带签名的新前端镜像」上线后，取消下面两行注释并 --force-recreate web-service 即可启用 ===
            # if ($secure_link = "")  { return 403; }   # 签名不对/被篡改/未签名
            # if ($secure_link = "0") { return 410; }   # 已过期（前端据此强制续票）

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            # 流媒体长连接配置（关闭缓冲，保持低延迟）
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_connect_timeout 300s;
            proxy_send_timeout 20m;
            proxy_read_timeout 20m;

            # SRS HTTP-FLV 服务运行在宿主机 8080（host 网络模式），经 srs-host 解析
            proxy_pass http://srs-host:8080;

            error_log /var/log/nginx/srs_flv_error.log warn;
            access_log /var/log/nginx/srs_flv_access.log main;
        }

        # ZLMediaKit(WVP/GB28181) ws-flv / http-flv 流代理：/rtp/<stream>.live.flv
        # 同时支持 WebSocket(ws-flv) 与普通 GET(http-flv)。^~ 确保优先于上面的正则匹配。
        location ^~ /rtp/ {
            allow all;

            # secure_link 鉴权（ws-flv 同样生效：校验发生在 WS 握手的 HTTP 请求阶段）
            # 密钥见 server 块的 $stream_secret；公式 = md5("$arg_e$uri <secret>")。
            secure_link        $arg_st,$arg_e;
            secure_link_md5    "$arg_e$uri $stream_secret";
            # === 强制校验：待「带签名的新前端镜像」上线后，取消下面两行注释并 --force-recreate web-service 即可启用 ===
            # if ($secure_link = "")  { return 403; }
            # if ($secure_link = "0") { return 410; }

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            # WebSocket 升级（ws-flv 必需）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 流媒体长连接配置（关闭缓冲，保持低延迟）
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_connect_timeout 300s;
            proxy_send_timeout 20m;
            proxy_read_timeout 20m;

            # ZLMediaKit HTTP/WS 播流端口映射在宿主机 6080，经 zlm-host 解析
            proxy_pass http://zlm-host:6080;

            error_log /var/log/nginx/zlm_flv_error.log warn;
            access_log /var/log/nginx/zlm_flv_access.log main;
        }

        # MinIO API代理（使用^~确保优先匹配）
        location ^~ /api/v1/buckets {
            allow all;

            # CORS跨域配置
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_pass http://MinIO:9001/api/v1/buckets;
        }

        # 通用开发API代理 - 将/dev-api代理到/admin-api
        # 请求 /dev-api/system/captcha/get 会被代理到 http://gateway:48080/admin-api/system/captcha/get
        # 生产构建 VITE_GLOB_API_URL=/dev-api，集群概览 WS 走 /dev-api/node/ws/cluster-metrics
        location /dev-api/ {
            allow all;

            # WebSocket 升级（与 /admin-api/ 一致，供容器部署前端实时指标推送）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            
            # CORS跨域配置
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }
            
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            # 直接在proxy_pass中处理路径替换，将/dev-api/替换为/admin-api/
            proxy_pass http://gateway:48080/admin-api/;

            # 上游不可达时返回 JSON 友好错误（前端可据此提示"后端服务未就绪"）
            proxy_intercept_errors on;
            error_page 502 504 = @dev_api_unavailable;
        }

        # /dev-api 上游不可达时的 JSON 错误响应
        location @dev_api_unavailable {
            add_header Content-Type "application/json; charset=utf-8" always;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials 'true' always;
            return 503 '{"code":503,"msg":"后端服务未就绪，请检查 Gateway(iot-gateway) 是否已启动","data":null}';
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 错误页面
        # 注意：不要用 error_page 404 /index.html 兜底——SPA 深链已由上面的
        # `location / { try_files $uri $uri/ /index.html; }` 处理；若再加 404→index.html，
        # 会把缺失的 /assets/*.js 也包成 index.html(text/html)，引发 MIME 报错且掩盖真实 404。
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}

