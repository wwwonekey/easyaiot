spring:
  main:
    allow-circular-references: true # 允许循环依赖，因为项目是三层架构，无法避免这个情况。
  cloud:
    # Spring Cloud Gateway 配置项，对应 GatewayProperties 类
    gateway:
      # 路由配置项，对应 RouteDefinition 数组
      routes:
        # VIDEO模块（摄像头、告警、算法任务、推流等 /admin-api/video/**）
        - id: video-admin-api
          uri: lb://video-server
          order: 0
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/video/**
          filters:
            - StripPrefix=1
            - RewritePath=/admin-api/model/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
        # AI模块（SAM 推理较慢，延长至 10 分钟）
        - id: model-admin-api
          uri: lb://model-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/model/**
          metadata:
            response-timeout: 600000
          filters:
            - StripPrefix=1
            - RewritePath=/admin-api/model/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
        # AI模块 - 处理重复路径前缀的情况
        - id: model-admin-api-duplicate
          uri: lb://model-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/admin-api/model/**
          metadata:
            response-timeout: 600000
          filters:
            - RewritePath=/admin-api/admin-api/(?<segment>.*), /admin-api/$\{segment} # 移除重复的 /admin-api 前缀
            - StripPrefix=1
            - RewritePath=/admin-api/model/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
        # 模型实验服务
        - id: studio-admin-api
          uri: lb://studio-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/experiment/**
          filters:
            - StripPrefix=1
            - RewritePath=/admin-api/dataset/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
        # 数据集服务（含标注导入/导出：/dataset/{id}/annotation/*）
        - id: dataset-admin-api
          uri: lb://dataset-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/dataset/**, /admin-api/warehouse/**
          metadata:
            # 文件夹上传、YOLO 导出 ZIP、云平台导入等可能较慢，延长至 30 分钟
            response-timeout: 1800000
          filters:
            - StripPrefix=1
            - RewritePath=/admin-api/dataset/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
        # 服务器节点管理服务（本机导出+同步离线镜像，延长至 45 分钟）
        - id: node-admin-api
          uri: lb://node-server
          predicates:
            - Path=/admin-api/node/**
          metadata:
            response-timeout: 2700000
          filters:
            - StripPrefix=1
            - RewritePath=/admin-api/node/v3/api-docs, /v3/api-docs
        # iot-sink 服务（算法后处理 Kafka 入队/消费/落库）
        - id: sink-admin-api
          uri: lb://sink-server
          predicates:
            - Path=/admin-api/sink/**
          filters:
            # 去掉 /admin-api/sink 前缀，与 sink 内 @RequestMapping("/post-process") 等路径对齐（勿加 /admin）
            - RewritePath=/admin-api/sink/(?<segment>.*), /$\{segment}
        # 文件服务
        - id: file-admin-api
          uri: lb://file-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/file/**, /admin-api/sysFile/**
          filters:
            - StripPrefix=1
            - RewritePath=/admin-api/device/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
        # Message服务
        - id: message-admin-api
          uri: lb://message-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/message/**
          filters:
            - StripPrefix=1
            - RewritePath=/admin-api/message/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
        ## device-server 服务
        - id: device-admin-api # 路由的编号
          uri: lb://device-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/device/**, /admin-api/product/**, /admin-api/productTemplate/**, /admin-api/ota/**, /admin-api/protocol/**, /admin-api/rule/**, /admin-api/deviceThingModel/**, /admin-api/deviceEvent/**, /admin-api/deviceService/**, /admin-api/shadow/**, /admin-api/topic/**, /admin-api/productProperties/**, /admin-api/productCommands/**, /admin-api/productServices/**, /admin-api/productEvent/**, /admin-api/version/**, /admin-api/packages/**, /admin-api/version/**, /admin-api/api/**, /admin-api/calculate/**
          filters:
            - StripPrefix=1
            - RewritePath=/admin-api/device/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
        - id: device-app-api # 路由的编号
          uri: lb://device-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/app-api/device/**
          filters:
            - StripPrefix=1
            - RewritePath=/admin-api/device/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
        ## system-server 服务
        - id: system-admin-api # 路由的编号
          uri: lb://system-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/system/**
          filters:
            - RewritePath=/admin-api/system/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
        - id: system-app-api # 路由的编号
          uri: lb://system-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/app-api/system/**
          filters:
            - RewritePath=/app-api/system/v3/api-docs, /v3/api-docs
        ## infra-server 服务
        - id: infra-admin-api # 路由的编号
          uri: lb://infra-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/infra/**
          filters:
            - RewritePath=/admin-api/infra/v3/api-docs, /v3/api-docs
        - id: infra-app-api # 路由的编号
          uri: lb://infra-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/app-api/infra/**
          filters:
            - RewritePath=/app-api/infra/v3/api-docs, /v3/api-docs
        - id: infra-spring-boot-admin # 路由的编号（Spring Boot Admin）
          uri: lb://infra-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin/**
        - id: infra-websocket # 路由的编号（WebSocket）
          uri: lb://infra-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/infra/ws/**
        # TDengine服务
        - id: iot-modules-tdengine
          uri: lb://tdengine-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/tdengine/**
          filters:
            - RewritePath=/admin-api/device/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
        # Broker服务
        - id: iot-modules-broker
          uri: lb://broker-server
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/broker/**
          filters:
            - RewritePath=/admin-api/device/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
        # GB28181服务
        - id: gb28181-admin-api
          uri: lb://iot-gb28181
          predicates: # 断言，作为路由的匹配条件，对应 RouteDefinition 数组
            - Path=/admin-api/gb28181/**
          filters:
            - RewritePath=/admin-api/gb28181/(?<segment>.*), /api/$\{segment} # 将 /admin-api/gb28181 前缀重写为 /api
            - RewritePath=/admin-api/gb28181/v3/api-docs, /v3/api-docs # 配置，保证转发到 /v3/api-docs
      x-forwarded:
        prefix-enabled: false # 避免 Swagger 重复带上额外的 /admin-api/system 前缀

knife4j:
  # 聚合 Swagger 文档，参考 https://doc.xiaominfo.com/docs/action/springcloud-gateway 文档
  gateway:
    enabled: true
    routes:
      - name: system-server
        service-name: system-server
        url: /admin-api/system/v3/api-docs
      - name: infra-server
        service-name: infra-server
        url: /admin-api/infra/v3/api-docs
      - name: device-server
        service-name: device-server
        url: /admin-api/device/v3/api-docs
      - name: gb28181-server
        service-name: iot-gb28181
        url: /admin-api/gb28181/v3/api-docs

--- #################### BasicLab相关配置 ####################

iot:
  info:
    version: 1.0.0